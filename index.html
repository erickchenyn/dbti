<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBTI — Dota2 行为类型测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e0e12;--bg2:#16161d;--bg3:#1e1e28;
  --red:#c23a2b;--red-dim:#8b2920;--gold:#d4a843;--gold-dim:#9e7e33;
  --text:#e8e6e3;--text-dim:#8a8a8e;--text-dark:#555;
  --green:#4caf50;--blue:#5c8ac7;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;overflow-x:hidden}
a{color:var(--gold);text-decoration:none}

/* Screens */
.screen{display:none;min-height:100vh;animation:fadeIn .5s ease}
.screen.active{display:flex;flex-direction:column;align-items:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Intro */
#intro{justify-content:center;text-align:center;padding:40px 20px}
.logo-icon{font-size:80px;margin-bottom:20px;filter:drop-shadow(0 0 30px rgba(194,58,43,.4))}
#intro h1{font-size:2.4rem;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
#intro .subtitle{color:var(--text-dim);font-size:1rem;line-height:1.6;max-width:400px;margin:0 auto 8px}
.intro-meta{color:var(--text-dark);font-size:.85rem;margin-bottom:40px}
.btn{display:inline-block;padding:16px 48px;font-size:1.1rem;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:all .25s;color:#fff}
.btn-primary{background:linear-gradient(135deg,var(--red),#d44a3a);box-shadow:0 4px 20px rgba(194,58,43,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(194,58,43,.5)}
.btn-primary:active{transform:translateY(0)}
.intro-footer{margin-top:32px;color:var(--text-dark);font-size:.8rem}

/* Quiz */
#quiz{padding:20px;max-width:560px;width:100%;margin:0 auto}
.progress-bar{width:100%;height:4px;background:var(--bg3);border-radius:2px;margin:20px 0 12px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px;transition:width .4s ease}
.progress-text{text-align:center;font-size:.85rem;color:var(--text-dim);margin-bottom:32px}
.question-card{animation:slideIn .4s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.q-category{display:inline-block;font-size:.75rem;color:var(--gold);background:rgba(212,168,67,.12);padding:4px 12px;border-radius:20px;margin-bottom:16px}
.q-text{font-size:1.2rem;font-weight:600;line-height:1.6;margin-bottom:28px;min-height:72px}
.options{display:flex;flex-direction:column;gap:12px}
.option{background:var(--bg2);border:1.5px solid transparent;border-radius:12px;padding:16px 20px;cursor:pointer;transition:all .2s;font-size:.95rem;line-height:1.5;text-align:left}
.option:hover{border-color:var(--gold-dim);background:var(--bg3)}
.option.selected{border-color:var(--gold);background:rgba(212,168,67,.1)}

/* Loading */
#loading{justify-content:center;text-align:center;padding:40px}
.loading-icon{font-size:64px;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.15);opacity:1}}
#loading h2{margin:24px 0 12px;font-size:1.5rem;color:var(--gold)}
#loading p{color:var(--text-dim);font-size:.9rem}
.loading-bar{width:240px;height:6px;background:var(--bg3);border-radius:3px;margin:24px auto;overflow:hidden}
.loading-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:3px;animation:loadBar 2.5s ease forwards}
@keyframes loadBar{to{width:100%}}

/* Result */
#result{padding:32px 20px 60px;max-width:600px;width:100%;margin:0 auto}
.result-header{text-align:center;margin-bottom:36px}
.result-badge{display:inline-block;font-size:.8rem;color:var(--gold);background:rgba(212,168,67,.12);padding:6px 16px;border-radius:20px;margin-bottom:16px}
.result-type{font-size:2.8rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.result-name{font-size:1.3rem;color:var(--text-dim);margin-bottom:12px}
.result-match{font-size:1rem;color:var(--gold)}
.result-quote{text-align:center;font-style:italic;color:var(--text-dim);font-size:1.05rem;padding:20px 24px;background:var(--bg2);border-left:3px solid var(--gold);border-radius:0 12px 12px 0;margin-bottom:36px;line-height:1.6}

.section{margin-bottom:32px}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title span{font-size:1.2rem}

.desc-text{color:var(--text-dim);line-height:1.8;font-size:.95rem}
.desc-text p{margin-bottom:12px}

/* Position cards */
.pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pos-card{background:var(--bg2);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:.9rem}
.pos-card.good{border-left:3px solid var(--green)}
.pos-card.ok{border-left:3px solid var(--gold)}
.pos-card.bad{border-left:3px solid var(--red)}
.pos-icon{font-size:1.1rem;flex-shrink:0}

/* Skills */
.skill-list{list-style:none}
.skill-list li{padding:10px 16px;background:var(--bg2);border-radius:10px;margin-bottom:8px;font-size:.9rem;line-height:1.5;display:flex;align-items:flex-start;gap:10px}
.skill-list li .icon{flex-shrink:0;font-size:1rem;margin-top:2px}

/* Radar */
.radar-wrap{display:flex;justify-content:center;margin-bottom:8px}
.radar-wrap svg{max-width:380px;width:100%}
.dim-details{display:grid;grid-template-columns:1fr;gap:6px}
.dim-row{display:flex;align-items:center;gap:10px;font-size:.85rem;padding:6px 0}
.dim-label{width:72px;flex-shrink:0;color:var(--text-dim);text-align:right}
.dim-bar-bg{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.dim-bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
.dim-val{width:28px;text-align:right;color:var(--gold);font-weight:600;font-size:.8rem}

/* Teammate quote */
.teammate-quote{background:var(--bg2);border-radius:12px;padding:20px;font-size:.9rem;line-height:1.7;color:var(--text-dim)}
.teammate-quote .speaker{color:var(--gold);font-weight:600}

/* Sub type */
.sub-type-card{background:var(--bg2);border-radius:12px;padding:20px;text-align:center}
.sub-type-card .label{font-size:.85rem;color:var(--text-dim);margin-bottom:8px}
.sub-type-card .name{font-size:1.4rem;font-weight:700;color:var(--gold)}
.sub-type-card .tagline{font-size:.9rem;color:var(--text-dim);margin-top:4px}

/* Restart */
.restart-wrap{text-align:center;margin-top:40px}
.btn-ghost{background:transparent;border:1.5px solid var(--text-dark);color:var(--text-dim);padding:12px 36px;border-radius:10px;cursor:pointer;font-size:.95rem;transition:all .2s}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}

/* Responsive */
@media(max-width:480px){
  #intro h1{font-size:1.8rem}
  .result-type{font-size:2.2rem}
  .q-text{font-size:1.05rem}
  .pos-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro" class="screen active">
  <div class="logo-icon">⚔️</div>
  <h1>DBTI</h1>
  <p class="subtitle">Dota2 Behavioral Type Indicator<br>你是什么型的 Dota2 玩家？</p>
  <p class="intro-meta">30 道题 · 3 分钟 · 20 种玩家类型</p>
  <button class="btn btn-primary" onclick="startQuiz()">开始测试</button>
  <p class="intro-footer">仅供娱乐 · 不代表真实水平 · 别拿去喷队友</p>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText"></div>
  <div id="questionArea"></div>
</div>

<!-- LOADING -->
<div id="loading" class="screen">
  <div class="loading-icon">🔮</div>
  <h2>正在分析你的 Dota2 灵魂...</h2>
  <p>匹配中，请稍候</p>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<!-- RESULT -->
<div id="result" class="screen"></div>

<script>
// ============================================================
// DATA
// ============================================================

  Ec1:'全图资源都是我的',Ec2:'每秒都在创造价值',Ec3:'优先个人装备',
  Tf1:'我就是开团信号',Tf2:'不杀后排不罢休',Tf3:'乱战之王',
  Me1:'逆风翻盘才是Dota',Me2:'全程指挥',Me3:'都是队友的锅',
  Sy1:'什么都能来一手',Sy2:'赢才是一切',Sy3:'必须抱团'
};

const CATEGORIES = {St:'🗺️ 战略',Ec:'💰 资源',Tf:'⚔️ 团战',Me:'🧠 心态',Sy:'🎭 风格'};

const questions = [
  // St1 大局观
  {dim:'St1',cat:'St',text:'你正在打野，小地图显示中路队友血量在掉。你的第一反应是？',

  {dim:'Ec1',cat:'Ec',text:'队伍大哥在刷野，你看到旁边一波野没人打。你会？',
   opts:[{t:'不打，让给大哥',v:1},{t:'看大哥会不会来，不来我就打了',v:2},{t:'直接清掉，效率第一',v:3}]},
  // Ec2 效率感
  {dim:'Ec2',cat:'Ec',text:'等待复活的 30 秒里，你在干什么？',

  {dim:'Ec2',cat:'Ec',text:'你走路从泉水到线上，路过一个野点。你会？',

    qt:['你：打肉山。','队友：对面五个都活着。','你：打完再走。','队友：他们来了！','你：先打肉山！']},
  TILT:{v:[1,3,1,2,1,2,3,2,1,1,2,3,1,3,2],name:'上头哥',tag:'"再来一把！这把一定赢！"',
    desc:'你的一晚上 Dota 通常是这样的：赢两把，飘了；输一把，不服；再输一把，上头；再输三把，已经凌晨了但必须赢一把才能睡。你的天梯分是坐过山车的——上午冲上去，晚上掉回来。你最大的敌人不是对面，是你自己的心态。',
    pos:[['任何位置（看心态阶段）','ok'],['上头时别打天梯','bad']],
    str:['状态好的时候势不可挡','强烈的胜负欲','不服输的精神','爆发力极强'],
    weak:['心态管理——完全没有','掉分后的理性判断','知道什么时候该停','凌晨 3 点的操作水平'],
    qt:['你：再来一把。','朋友：你已经输了四把了。','你：这把一定赢。','（输了）','你：最后一把。','（又输了）','你：再最后一把……']},
};

// ============================================================
// STATE
// ============================================================
let shuffled=[], currentQ=0, scores={}, hiddenTriggered=false, hiddenAnswer=null;

function initScores(){scores={};DIMS.forEach(d=>scores[d]=0)}

// ============================================================
// SCREENS
// ============================================================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz(){
  initScores();
  shuffled=[...questions].sort(()=>Math.random()-.5);
  currentQ=0;hiddenTriggered=false;hiddenAnswer=null;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion(){
  const total=shuffled.length+(hiddenTriggered&&currentQ===shuffled.length?1:0);
  const num=currentQ+1;
  const isHidden=currentQ>=shuffled.length;
  const q=isHidden?hiddenQ:shuffled[currentQ];
  document.getElementById('progressFill').style.width=((currentQ)/shuffled.length*100)+'%';
  document.getElementById('progressText').textContent=`${Math.min(num,shuffled.length)} / ${shuffled.length}`;
  const catLabel=CATEGORIES[q.cat]||'';
  let html=`<div class="question-card">
    <div class="q-category">${catLabel}${isHidden?' · 隐藏题':''}</div>
    <div class="q-text">${q.text}</div>
    <div class="options">`;
  q.opts.forEach((o,i)=>{
    html+=`<div class="option" onclick="selectOption(${i})">${o.t}</div>`;
  });
  html+=`</div></div>`;
  document.getElementById('questionArea').innerHTML=html;
}

function selectOption(idx){
  const opts=document.querySelectorAll('.option');
  opts.forEach(o=>o.classList.remove('selected'));
  opts[idx].classList.add('selected');
  const isHidden=currentQ>=shuffled.length;
  const q=isHidden?hiddenQ:shuffled[currentQ];
  const val=q.opts[idx].v;

  if(isHidden){
    hiddenAnswer=val;
    setTimeout(()=>finishQuiz(),400);
    return;
  }

  scores[q.dim]=(scores[q.dim]||0)+val;

  setTimeout(()=>{
    currentQ++;
    // Check hidden trigger: Sy2 both max (score=6)
    if(currentQ===shuffled.length){
      if(scores['Sy2']>=6){
        hiddenTriggered=true;
        renderQuestion();
        return;
      }
      finishQuiz();
      return;
    }
    renderQuestion();
  },350);
}

function finishQuiz(){
  showScreen('loading');
  setTimeout(()=>showResult(),2800);
}

// ============================================================
// MATCHING
// ============================================================
function calcLevel(s){
  // min 2 max 6 per dim (2 questions each 1-3)
  if(s<=3) return 1; // L
  if(s<=4) return 2; // M
  return 3; // H
}

function matchTypes(){
  // TILT override
  if(hiddenAnswer==='TILT') return [{code:'TILT',pct:95},{code:findBest().code,pct:findBest().pct}];

  const userVec=DIMS.map(d=>calcLevel(scores[d]));
  let results=[];
  for(const[code,t]of Object.entries(TYPES)){
    if(code==='TILT') continue;
    let dist=0, exact=0;
    t.v.forEach((v,i)=>{
      dist+=(v-userVec[i])**2;
      if(v===userVec[i]) exact++;
    });
    results.push({code,dist,exact});
  }
  results.sort((a,b)=>a.dist-b.dist||(b.exact-a.exact));
  const best=results[0], second=results[1];
  const maxDist=15*4; // 15 dims * max diff^2(4)
  const pct=Math.round((1-best.dist/maxDist)*100);
  const pct2=Math.round((1-second.dist/maxDist)*100);
  return [{code:best.code,pct:Math.max(pct,55)},{code:second.code,pct:Math.max(pct2,40)}];
}

function findBest(){
  const userVec=DIMS.map(d=>calcLevel(scores[d]));
  let results=[];
  for(const[code,t]of Object.entries(TYPES)){
    if(code==='TILT') continue;
    let dist=0;t.v.forEach((v,i)=>{dist+=(v-userVec[i])**2});
    results.push({code,dist});
  }
  results.sort((a,b)=>a.dist-b.dist);
  const maxDist=60;
  return {code:results[0].code,pct:Math.max(Math.round((1-results[0].dist/maxDist)*100),45)};
}

// ============================================================
// RADAR CHART (SVG)
// ============================================================
function radarSVG(){
  const cx=190,cy=180,r=140;
  const dims=DIMS;
  const n=dims.length;
  const angleStep=2*Math.PI/n;
  const startAngle=-Math.PI/2;

  function pt(i,ratio){
    const a=startAngle+i*angleStep;
    return [cx+r*ratio*Math.cos(a),cy+r*ratio*Math.sin(a)];
  }

  let svg=`<svg viewBox="0 0 380 370" xmlns="http://www.w3.org/2000/svg">`;
  // Grid
  [.33,.66,1].forEach(ratio=>{
    let poly='';
    for(let i=0;i<n;i++){const[x,y]=pt(i,ratio);poly+=`${x},${y} `}
    svg+=`<polygon points="${poly}" fill="none" stroke="#2a2a35" stroke-width="1"/>`;
  });
  // Axes
  for(let i=0;i<n;i++){
    const[x,y]=pt(i,1);
    svg+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#2a2a35" stroke-width="1"/>`;
  }
  // Data
  const maxScore=6;
  let dataPoly='';
  for(let i=0;i<n;i++){
    const ratio=(scores[dims[i]]||2)/maxScore;
    const[x,y]=pt(i,ratio);
    dataPoly+=`${x},${y} `;
  }
  svg+=`<polygon points="${dataPoly}" fill="rgba(212,168,67,0.15)" stroke="#d4a843" stroke-width="2"/>`;
  // Dots & labels
  for(let i=0;i<n;i++){
    const ratio=(scores[dims[i]]||2)/maxScore;
    const[dx,dy]=pt(i,ratio);
    svg+=`<circle cx="${dx}" cy="${dy}" r="3.5" fill="#d4a843"/>`;
    const[lx,ly]=pt(i,1.18);
    const anchor=lx<cx-20?'end':lx>cx+20?'start':'middle';
    svg+=`<text x="${lx}" y="${ly+4}" text-anchor="${anchor}" fill="#8a8a8e" font-size="11">${DIM_NAMES[dims[i]]}</text>`;
  }
  svg+=`</svg>`;
  return svg;
}

// ============================================================
// RESULT RENDER
// ============================================================
function showResult(){
  const[main,sub]=matchTypes();
  const t=TYPES[main.code];
  const s=TYPES[sub.code];

  let html=`
  <div class="result-header">
    <div class="result-badge">DBTI 测试结果</div>
    <div class="result-type">${main.code}</div>
    <div class="result-name">${t.name}</div>
    <div class="result-match">匹配度 ${main.pct}%</div>
  </div>
  <div class="result-quote">${t.tag}</div>

  <div class="section">
    <div class="section-title"><span>📖</span> 你是谁</div>
    <div class="desc-text"><p>${t.desc}</p></div>
  </div>

  <div class="section">
    <div class="section-title"><span>📍</span> 推荐位置</div>
    <div class="pos-grid">`;
  t.pos.forEach(([label,cls])=>{
    const icon=cls==='good'?'✅':cls==='ok'?'⚠️':'❌';
    html+=`<div class="pos-card ${cls}"><span class="pos-icon">${icon}</span>${label}</div>`;
  });
  html+=`</div></div>

  <div class="section">
    <div class="section-title"><span>🎯</span> 擅长的事</div>
    <ul class="skill-list">`;
  t.str.forEach(s=>{html+=`<li><span class="icon">⚡</span>${s}</li>`});
  html+=`</ul></div>

  <div class="section">
    <div class="section-title"><span>💀</span> 不擅长的事</div>
    <ul class="skill-list">`;
  t.weak.forEach(w=>{html+=`<li><span class="icon">💢</span>${w}</li>`});
  html+=`</ul></div>

  <div class="section">
    <div class="section-title"><span>📊</span> 15 维度分析</div>
    <div class="radar-wrap">${radarSVG()}</div>
    <div class="dim-details">`;
  DIMS.forEach(d=>{
    const raw=scores[d]||2;
    const pct=Math.round((raw/6)*100);
    const color=pct>70?'var(--gold)':pct>40?'var(--blue)':'var(--red)';
    const levelLabel=raw<=3?DIM_LOW[d]:raw>=5?DIM_HIGH[d]:'中等';
    html+=`<div class="dim-row">
      <span class="dim-label">${DIM_NAMES[d]}</span>
      <div class="dim-bar-bg"><div class="dim-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="dim-val">${raw}</span>
    </div>`;
  });
  html+=`</div></div>

  <div class="section">
    <div class="section-title"><span>🍺</span> 你的队友可能会说</div>
    <div class="teammate-quote">`;
  t.qt.forEach(q=>{
    if(q.startsWith('你：')||q.startsWith('你:'))
      html+=`<div><span class="speaker">你：</span>${q.replace(/^你[：:]/,'')}</div>`;
    else if(q.startsWith('（'))
      html+=`<div style="color:var(--text-dark);font-style:italic">${q}</div>`;
    else
      html+=`<div>${q}</div>`;
  });
  html+=`</div></div>

  <div class="section">
    <div class="section-title"><span>🎭</span> 你的隐藏面</div>
    <div class="sub-type-card">
      <div class="label">副类型 · 匹配度 ${sub.pct}%</div>
      <div class="name">${sub.code} — ${s.name}</div>
      <div class="tagline">${s.tag}</div>
    </div>
  </div>

  <div class="restart-wrap">
    <button class="btn-ghost" onclick="startQuiz()">重新测试</button>
  </div>`;

  document.getElementById('result').innerHTML=html;
  showScreen('result');

  // Animate dimension bars
  setTimeout(()=>{
    document.querySelectorAll('.dim-bar-fill').forEach(el=>{
      el.style.width=el.style.width; // trigger reflow
    });
  },100);
}
